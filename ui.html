<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DTCG Token Exporter</title>
    <style>
      :root {
        --accent: #18a0fb;
        --black: #000;
        --black-80: rgba(0, 0, 0, 0.8);
        --black-30: rgba(0, 0, 0, 0.3);
        --gray: #f0f0f0;
        --gray-soft: #f7f7f7;
        --white: #fff;
      }

      * {
        box-sizing: border-box;
      }

      p {
        margin: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--white);
        color: var(--black);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        font-size: 11px;
        overflow: hidden;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
      }

      .sidebar {
        width: 200px;
        border-right: 1px solid var(--gray);
        display: flex;
        flex-direction: column;
      }

      .section {
        padding: 16px;
      }

      h2 {
        font-size: 11px;
        font-weight: 500;
        margin: 0 0 4px 0;
      }

      .section + .section {
        border-top: 1px solid var(--gray);
      }

      .toggle-row {
        display: flex;
        align-items: center;
      }

      .toggle {
        position: relative;
        width: 40px;
        height: 32px;
        flex: 0 0 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .toggle-ui {
        width: 24px;
        height: 12px;
        border-radius: 9999px;
        background: #b3b3b3;
        position: relative;
        transition: background 120ms ease;
      }

      .toggle-ui::after {
        content: "";
        position: absolute;
        top: 1px;
        left: 1px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #fff;
        transition: left 120ms ease;
      }

      .toggle input:checked + .toggle-ui {
        background: var(--accent);
      }

      .toggle input:checked + .toggle-ui::after {
        left: 13px;
      }

      .toggle-label {
        line-height: 16px;
        letter-spacing: 0.055px;
        color: var(--black-80);
        padding: 8px;
        user-select: none;
        cursor: pointer;
      }

      .download-area {
        padding: 16px;
        border-top: 1px solid var(--gray);
        border-bottom: 1px solid var(--gray);
      }

      .btn {
        width: 100%;
        height: 32px;
        border: 0;
        border-radius: 4px;
        background: var(--accent);
        color: var(--white);
        font-size: 11px;
        letter-spacing: 0.055px;
        cursor: pointer;
      }

      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .single-main {
        height: 100%;
      }

      .single-container {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      .panel {
        border: 1px solid var(--gray);
        border-radius: 4px;
        overflow: hidden;
        background: var(--white);
      }

      .panel-header {
        background: var(--gray-soft);
        border-bottom: 1px solid var(--gray);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 4px 4px 8px;
      }

      .panel-title {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        line-height: 16px;
        letter-spacing: 0.055px;
      }

      .actions {
        display: flex;
        gap: 4px;
      }

      .icon-btn {
        width: 32px;
        height: 32px;
        border: 1px solid var(--gray);
        background: var(--white);
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        cursor: pointer;
      }

      .icon-btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--white);
      }

      .icon-btn svg {
        width: 32px;
        height: 32px;
      }

      .code-container {
        position: relative;
        height: calc(100% - 28px);
      }

      .code-shell {
        display: flex;
        height: 100%;
      }

      .line-numbers {
        width: 29px;
        flex: 0 0 29px;
        margin: 0;
        padding: 8px 8px 40px;
        text-align: right;
        font-family:
          "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas,
          monospace;
        font-size: 11px;
        line-height: 16px;
        letter-spacing: 0.05px;
        color: var(--black-30);
        background: var(--white);
        overflow: hidden;
        user-select: none;
        white-space: pre;
      }

      .code-area {
        width: 100%;
        border: 0;
        margin: 0;
        resize: none;
        outline: 0;
        background: var(--white);
        color: var(--black-80);
        padding: 8px 12px 40px 0;
        font-family:
          "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas,
          monospace;
        font-size: 11px;
        line-height: 16px;
        letter-spacing: 0.05px;
      }

      .code-footer {
        position: absolute;
        right: 8px;
        bottom: 8px;
        display: flex;
        gap: 4px;
      }

      .pill {
        border: 1px solid var(--gray);
        background: var(--white);
        border-radius: 4px;
        padding: 4px 8px;
        margin-bottom: 12px;
        font-size: 9px;
        line-height: 16px;
        letter-spacing: 0.144px;
        color: var(--black-80);
        white-space: nowrap;
      }

      .split-main {
        display: none;
        height: 100%;
        overflow: auto;
        padding: 8px 24px 8px 8px;
        gap: 16px;
        flex-direction: column;
      }

      .split-main.active {
        display: flex;
      }

      .single-main.hidden {
        display: none;
      }

      .split-card {
        height: 240px;
        flex: 0 0 auto;
      }

      .split-card .code-container {
        height: calc(100% - 28px);
      }

      .top-menu {
        border-bottom: 1px solid var(--gray);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 16px 12px 10px;
      }

      .menu-tab {
        border: 0;
        border-radius: 4px;
        padding: 4px 6px;
        background: var(--white);
        color: #707070;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
      }

      .menu-tab.active {
        background: #e9e9e9;
        color: #111;
        font-weight: 600;
      }

      .page {
        display: none;
        flex: 1;
        min-height: 0;
      }

      .page.page-tokens.active {
        display: flex;
        flex-direction: column;
      }

      .tokens-layout {
        flex: 1;
        min-height: 0;
        display: flex;
      }

      .page.page-settings.active {
        display: flex;
        flex-direction: column;
      }

      .settings-content {
        padding: 16px;
      }

      .form-inline {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .form-inline p {
        flex: 1;
      }

      .form-language {
        display: flex;
        flex-direction: column;
        gap: 2px;
        flex: 1;
      }

      .form-inline input,
      .form-inline select {
        width: 200px;
      }

      .field-help {
        margin-top: 4px;
        font-size: 11px;
        color: #2f2f2f;
      }

      .suffix-field {
        height: 32px;
        width: 200px;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: var(--white);
        display: flex;
        align-items: center;
        padding: 0 12px;
      }

      .suffix-field input {
        border: 0;
        outline: 0;
        flex: 1;
        font-size: 11px;
      }

      .suffix-field span {
        color: #a0a0a0;
        font-size: 11px;
      }

      .field-select {
        height: 32px;
        width: 200px;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 0 12px;
        font-size: 11px;
        background: var(--white);
      }

      .footer {
        border-top: 1px solid var(--gray);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        font-size: 11px;
        color: #2f2f2f;
      }

      .footer-links {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .footer-links a {
        color: inherit;
        text-decoration: none;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }

    </style>
  </head>
  <body>
    <div class="app">
      <div class="top-menu">
        <button id="tab-tokens" class="menu-tab active" type="button">
          Tokens
        </button>
        <button id="tab-settings" class="menu-tab" type="button">
          Settings
        </button>
      </div>

      <div id="page-tokens" class="page page-tokens active">
        <div class="tokens-layout">
          <aside class="sidebar">
            <div class="section">
              <h2 id="general-title">General</h2>

              <div class="toggle-row">
                <label class="toggle" for="include-root">
                  <input id="include-root" type="checkbox" checked />
                  <span class="toggle-ui"></span>
                </label>
                <label
                  id="include-root-label"
                  class="toggle-label"
                  for="include-root"
                  >Include collection</label
                >
              </div>

              <div class="toggle-row">
                <label class="toggle" for="split-files">
                  <input id="split-files" type="checkbox" />
                  <span class="toggle-ui"></span>
                </label>
                <label
                  id="split-files-label"
                  class="toggle-label"
                  for="split-files"
                  >Separate tokens</label
                >
              </div>
            </div>

            <div class="section">
              <h2 id="collections-title">Collections</h2>
              <div id="groups-list"></div>
            </div>

            <div class="download-area">
              <button id="sidebar-download" class="btn" type="button">
                Download file
              </button>
            </div>
          </aside>

          <main class="main">
            <div id="single-main" class="single-main">
              <div class="single-container panel">
                <div class="panel-header">
                  <p id="single-panel-title" class="panel-title">tokens</p>
                  <div class="actions">
                    <button
                      id="single-refresh"
                      class="icon-btn"
                      type="button"
                      title="Refresh"
                      aria-label="Refresh"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        fill="none"
                        viewBox="0 0 24 24"
                      >
                        <path
                          fill="#000"
                          d="m10.607 7.375-1.02 1.02h2.415v.002a4.427 4.427 0 1 1-4.427 4.427h.75a3.677 3.677 0 1 0 3.677-3.677v-.002H9.587l1.02 1.02-.53.53-1.66-1.66-.266-.265 1.925-1.925.53.53Z"
                        />
                      </svg>
                    </button>
                    <button
                      id="single-download"
                      class="icon-btn"
                      type="button"
                      title="Download"
                      aria-label="Download"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        fill="none"
                        viewBox="0 0 24 24"
                      >
                        <path
                          fill="#000"
                          d="M8.318 15.53v1.5h7.364v-1.5h.818v2.25h-9v-2.25h.818Zm4.057-2.14 2.37-2.2.51.55-3 2.785-.255.237-.255-.237-3-2.786.51-.55 2.37 2.201V6h.75v7.39Z"
                        />
                      </svg>
                    </button>
                    <button
                      id="single-copy"
                      class="icon-btn primary"
                      type="button"
                      title="Copy"
                      aria-label="Copy"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        fill="none"
                        viewBox="0 0 24 24"
                      >
                        <path
                          fill="#fff"
                          d="M17.5 6h-8a.5.5 0 0 0-.5.5V9H6.5a.5.5 0 0 0-.5.5v8a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5V15h2.5a.5.5 0 0 0 .5-.5v-8a.5.5 0 0 0-.5-.5ZM14 17H7v-7h7v7Zm3-3h-2V9.5a.5.5 0 0 0-.5-.5H10V7h7v7Z"
                        />
                      </svg>
                    </button>
                  </div>
                </div>
                <div class="code-container">
                  <div class="code-shell">
                    <pre id="single-lines" class="line-numbers">1</pre>
                    <textarea
                      id="single-code"
                      class="code-area"
                      readonly
                      spellcheck="false"
                    ></textarea>
                  </div>
                  <div class="code-footer">
                    <div id="single-token-pill" class="pill">0 tokens</div>
                    <div id="single-line-pill" class="pill">0 lines</div>
                    <div id="single-size-pill" class="pill">0 B</div>
                  </div>
                </div>
              </div>
            </div>

            <div id="split-main" class="split-main"></div>
          </main>
        </div>
      </div>

      <div id="page-settings" class="page page-settings">
        <div class="settings-content">
          <h2 id="settings-group-title">General</h2>
          <div class="form-inline">
            <p id="filename-label">File name</p>
            <div class="suffix-field">
              <input id="single-filename-base" type="text" value="tokens" />
              <span>.json</span>
            </div>
          </div>

          <div class="form-inline">
            <div class="form-language">
              <p id="language-label">Language</p>
              <p id="filename-help" class="field-help">
                Used when "Separate tokens" is disabled.
              </p>
            </div>
            <div>
              <select id="language-select" class="field-select">
                <option value="en">English</option>
                <option value="pt">Português</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="footer-links">
          <a
            href="https://github.com/mateusvillain/dtcg-tokens"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub</a
          >
          <span>&bull;</span>
          <a
            href="https://www.linkedin.com/in/mateusvillain/?locale=en_US"
            target="_blank"
            rel="noopener noreferrer"
            >LinkedIn</a
          >
        </div>
        <span>v1.0.0</span>
      </div>
    </div>

    <script>
      const includeRootInput = document.getElementById("include-root");
      const splitFilesInput = document.getElementById("split-files");
      const groupsList = document.getElementById("groups-list");
      const sidebarDownload = document.getElementById("sidebar-download");
      const languageSelect = document.getElementById("language-select");
      const singleFilenameInput = document.getElementById(
        "single-filename-base",
      );

      const tabTokens = document.getElementById("tab-tokens");
      const tabSettings = document.getElementById("tab-settings");
      const pageTokens = document.getElementById("page-tokens");
      const pageSettings = document.getElementById("page-settings");

      const singleMain = document.getElementById("single-main");
      const splitMain = document.getElementById("split-main");
      const singleLines = document.getElementById("single-lines");
      const singleCode = document.getElementById("single-code");
      const singleTokenPill = document.getElementById("single-token-pill");
      const singleLinePill = document.getElementById("single-line-pill");
      const singleSizePill = document.getElementById("single-size-pill");

      const I18N = {
        en: {
          tokensTab: "Tokens",
          settingsTab: "Settings",
          general: "General",
          includeCollection: "Include collection",
          separateTokens: "Separate tokens",
          collections: "Collections",
          downloadFile: "Download file",
          downloadFiles: "Download files",
          settingsGeneral: "General",
          language: "Language",
          fileName: "File name",
          filenameHelp: 'Used when "Separate tokens" is disabled.',
          refresh: "Refresh",
          download: "Download",
          copy: "Copy",
          tokensUnit: "tokens",
          linesUnit: "lines",
          panelTitle: "tokens",
        },
        pt: {
          tokensTab: "Tokens",
          settingsTab: "Configurações",
          general: "Geral",
          includeCollection: "Incluir coleção",
          separateTokens: "Separar tokens",
          collections: "Coleções",
          downloadFile: "Baixar arquivo",
          downloadFiles: "Baixar arquivos",
          settingsGeneral: "Geral",
          language: "Idioma",
          fileName: "Nome do arquivo",
          filenameHelp: 'Usado quando "Separar tokens" está desativado.',
          refresh: "Atualizar",
          download: "Baixar",
          copy: "Copiar",
          tokensUnit: "tokens",
          linesUnit: "linhas",
          panelTitle: "tokens",
        },
      };

      let currentLanguage = "en";
      let currentPage = "tokens";
      let isSyncingSettings = false;
      let lastPayload = null;

      function t(key) {
        const pack = I18N[currentLanguage] || I18N.en;
        return pack[key] || I18N.en[key] || key;
      }

      function applyTranslations() {
        tabTokens.textContent = t("tokensTab");
        tabSettings.textContent = t("settingsTab");
        document.getElementById("general-title").textContent = t("general");
        document.getElementById("include-root-label").textContent =
          t("includeCollection");
        document.getElementById("split-files-label").textContent =
          t("separateTokens");
        document.getElementById("collections-title").textContent =
          t("collections");
        document.getElementById("single-panel-title").textContent =
          t("panelTitle");
        document.getElementById("settings-group-title").textContent =
          t("settingsGeneral");
        document.getElementById("language-label").textContent = t("language");
        document.getElementById("filename-label").textContent = t("fileName");
        document.getElementById("filename-help").textContent =
          t("filenameHelp");
        document.querySelector(
          '#language-select option[value="en"]',
        ).textContent = "English";
        document.querySelector(
          '#language-select option[value="pt"]',
        ).textContent = "Português";

        document.getElementById("single-refresh").title = t("refresh");
        document
          .getElementById("single-refresh")
          .setAttribute("aria-label", t("refresh"));
        document.getElementById("single-download").title = t("download");
        document
          .getElementById("single-download")
          .setAttribute("aria-label", t("download"));
        document.getElementById("single-copy").title = t("copy");
        document
          .getElementById("single-copy")
          .setAttribute("aria-label", t("copy"));
        updateMainMode();
      }

      function showPage(page) {
        currentPage = page;
        const isTokens = page === "tokens";
        tabTokens.classList.toggle("active", isTokens);
        tabSettings.classList.toggle("active", !isTokens);
        pageTokens.classList.toggle("active", isTokens);
        pageSettings.classList.toggle("active", !isTokens);
      }

      function getEnabledGroups() {
        const items = groupsList.querySelectorAll(
          'input[type="checkbox"][data-group]',
        );
        if (!items.length) return null;

        const selected = [];
        items.forEach((item) => {
          if (item.checked) {
            selected.push(item.getAttribute("data-group"));
          }
        });
        return selected;
      }

      function requestRefresh() {
        const options = {
          includeCollectionOrCategoryRoot: includeRootInput.checked,
          splitByCollectionOrCategory: splitFilesInput.checked,
        };

        const enabledGroups = getEnabledGroups();
        if (enabledGroups !== null) {
          options.enabledGroups = enabledGroups;
        }

        parent.postMessage(
          { pluginMessage: { type: "refresh-tokens", options } },
          "*",
        );
      }

      function sendSettings() {
        if (isSyncingSettings) return;
        parent.postMessage(
          {
            pluginMessage: {
              type: "update-settings",
              settings: {
                language: languageSelect.value,
                singleFileName: singleFilenameInput.value,
              },
            },
          },
          "*",
        );
      }

      function applySettings(settings) {
        if (!settings || typeof settings !== "object") return;
        currentLanguage = settings.language === "pt" ? "pt" : "en";
        isSyncingSettings = true;
        languageSelect.value = currentLanguage;
        if (
          typeof settings.singleFileName === "string" &&
          settings.singleFileName.length > 0
        ) {
          singleFilenameInput.value = settings.singleFileName.replace(
            /\.json$/i,
            "",
          );
        }
        isSyncingSettings = false;
        applyTranslations();
      }

      function updateMainMode() {
        const splitMode = splitFilesInput.checked;
        if (splitMode) {
          singleMain.classList.add("hidden");
          splitMain.classList.add("active");
          sidebarDownload.textContent = t("downloadFiles");
        } else {
          singleMain.classList.remove("hidden");
          splitMain.classList.remove("active");
          sidebarDownload.textContent = t("downloadFile");
        }
      }

      function lineCount(text) {
        if (!text) return 1;
        return text.split("\n").length;
      }

      function buildLineNumbers(totalLines) {
        const lines = [];
        for (let i = 1; i <= totalLines; i += 1) {
          lines.push(String(i));
        }
        return lines.join("\n");
      }

      function updateLineNumbers(lineNode, text) {
        lineNode.textContent = buildLineNumbers(lineCount(text));
      }

      function syncLineNumbersScroll(textareaNode, lineNode) {
        textareaNode.addEventListener("scroll", () => {
          lineNode.scrollTop = textareaNode.scrollTop;
        });
      }

      function jsonTokenCount(jsonText) {
        try {
          const parsed = JSON.parse(jsonText);
          const stack = [parsed];
          let total = 0;

          while (stack.length > 0) {
            const current = stack.pop();
            if (!current || typeof current !== "object") continue;

            if (Array.isArray(current)) {
              current.forEach((item) => stack.push(item));
              continue;
            }

            if (Object.prototype.hasOwnProperty.call(current, "$value")) {
              total += 1;
            }

            Object.keys(current).forEach((key) => stack.push(current[key]));
          }

          return total;
        } catch (_error) {
          return 0;
        }
      }

      function bytesOfText(text) {
        return new TextEncoder().encode(text).length;
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
      }

      function getStats(json) {
        return {
          tokens: jsonTokenCount(json),
          lines: lineCount(json),
          size: formatBytes(bytesOfText(json)),
        };
      }

      function fillPills(tokenNode, lineNode, sizeNode, stats) {
        tokenNode.textContent = `${stats.tokens} ${t("tokensUnit")}`;
        lineNode.textContent = `${stats.lines} ${t("linesUnit")}`;
        sizeNode.textContent = `${stats.size}`;
      }

      function triggerDownload(
        content,
        filename,
        mime = "application/json;charset=utf-8",
      ) {
        const blob = new Blob([content], { type: mime });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function makeCrc32Table() {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let c = i;
          for (let j = 0; j < 8; j += 1) {
            c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          }
          table[i] = c >>> 0;
        }
        return table;
      }

      const CRC32_TABLE = makeCrc32Table();

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (let i = 0; i < bytes.length; i += 1) {
          crc = CRC32_TABLE[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function dateToDosTimeParts(date) {
        const year = Math.max(1980, date.getFullYear());
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const hours = date.getHours();
        const minutes = date.getMinutes();
        const seconds = Math.floor(date.getSeconds() / 2);
        return {
          dosTime: (hours << 11) | (minutes << 5) | seconds,
          dosDate: ((year - 1980) << 9) | (month << 5) | day,
        };
      }

      function u16le(value) {
        return new Uint8Array([value & 0xff, (value >> 8) & 0xff]);
      }

      function u32le(value) {
        return new Uint8Array([
          value & 0xff,
          (value >> 8) & 0xff,
          (value >> 16) & 0xff,
          (value >> 24) & 0xff,
        ]);
      }

      function concatUint8Arrays(chunks) {
        let total = 0;
        chunks.forEach((chunk) => {
          total += chunk.length;
        });
        const out = new Uint8Array(total);
        let offset = 0;
        chunks.forEach((chunk) => {
          out.set(chunk, offset);
          offset += chunk.length;
        });
        return out;
      }

      function buildZip(files) {
        const encoder = new TextEncoder();
        const now = dateToDosTimeParts(new Date());
        const localParts = [];
        const centralParts = [];
        let offset = 0;

        files.forEach((file) => {
          const nameBytes = encoder.encode(file.filename);
          const dataBytes = encoder.encode(file.json);
          const size = dataBytes.length;
          const checksum = crc32(dataBytes);

          const localHeader = concatUint8Arrays([
            u32le(0x04034b50),
            u16le(20),
            u16le(0),
            u16le(0),
            u16le(now.dosTime),
            u16le(now.dosDate),
            u32le(checksum),
            u32le(size),
            u32le(size),
            u16le(nameBytes.length),
            u16le(0),
            nameBytes,
          ]);

          const localRecord = concatUint8Arrays([localHeader, dataBytes]);
          localParts.push(localRecord);

          const centralHeader = concatUint8Arrays([
            u32le(0x02014b50),
            u16le(20),
            u16le(20),
            u16le(0),
            u16le(0),
            u16le(now.dosTime),
            u16le(now.dosDate),
            u32le(checksum),
            u32le(size),
            u32le(size),
            u16le(nameBytes.length),
            u16le(0),
            u16le(0),
            u16le(0),
            u16le(0),
            u32le(0),
            u32le(offset),
            nameBytes,
          ]);

          centralParts.push(centralHeader);
          offset += localRecord.length;
        });

        const localSection = concatUint8Arrays(localParts);
        const centralDir = concatUint8Arrays(centralParts);
        const eocd = concatUint8Arrays([
          u32le(0x06054b50),
          u16le(0),
          u16le(0),
          u16le(files.length),
          u16le(files.length),
          u32le(centralDir.length),
          u32le(localSection.length),
          u16le(0),
        ]);

        return new Blob([concatUint8Arrays([localSection, centralDir, eocd])], {
          type: "application/zip",
        });
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch (_error) {
          const tmp = document.createElement("textarea");
          tmp.value = text;
          document.body.appendChild(tmp);
          tmp.select();
          document.execCommand("copy");
          tmp.remove();
        }
      }

      function updateGroupsPanel(availableGroups, selectedGroups) {
        groupsList.innerHTML = "";
        const set = new Set(selectedGroups || []);

        availableGroups.forEach((group) => {
          const row = document.createElement("div");
          row.className = "toggle-row";

          const labelToggle = document.createElement("label");
          labelToggle.className = "toggle";

          const input = document.createElement("input");
          input.type = "checkbox";
          input.checked = set.has(group);
          input.setAttribute("data-group", group);
          input.onchange = () => requestRefresh();

          const ui = document.createElement("span");
          ui.className = "toggle-ui";

          labelToggle.appendChild(input);
          labelToggle.appendChild(ui);

          const text = document.createElement("label");
          text.className = "toggle-label";
          text.textContent = group;
          text.onclick = () => {
            input.checked = !input.checked;
            requestRefresh();
          };

          row.appendChild(labelToggle);
          row.appendChild(text);
          groupsList.appendChild(row);
        });
      }

      function createActionIcon(type) {
        if (type === "refresh") {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path fill="#000" d="m10.607 7.375-1.02 1.02h2.415v.002a4.427 4.427 0 1 1-4.427 4.427h.75a3.677 3.677 0 1 0 3.677-3.677v-.002H9.587l1.02 1.02-.53.53-1.66-1.66-.266-.265 1.925-1.925.53.53Z"/></svg>';
        }
        if (type === "download") {
          return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path fill="#000" d="M8.318 15.53v1.5h7.364v-1.5h.818v2.25h-9v-2.25h.818Zm4.057-2.14 2.37-2.2.51.55-3 2.785-.255.237-.255-.237-3-2.786.51-.55 2.37 2.201V6h.75v7.39Z"/></svg>';
        }
        return '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path fill="#fff" d="M17.5 6h-8a.5.5 0 0 0-.5.5V9H6.5a.5.5 0 0 0-.5.5v8a.5.5 0 0 0 .5.5h8a.5.5 0 0 0 .5-.5V15h2.5a.5.5 0 0 0 .5-.5v-8a.5.5 0 0 0-.5-.5ZM14 17H7v-7h7v7Zm3-3h-2V9.5a.5.5 0 0 0-.5-.5H10V7h7v7Z"/></svg>';
      }

      function renderSplit(files) {
        splitMain.innerHTML = "";

        files.forEach((file) => {
          const card = document.createElement("div");
          card.className = "panel split-card";

          const header = document.createElement("div");
          header.className = "panel-header";

          const title = document.createElement("p");
          title.className = "panel-title";
          title.textContent = file.name;

          const actions = document.createElement("div");
          actions.className = "actions";

          const refreshBtn = document.createElement("button");
          refreshBtn.className = "icon-btn";
          refreshBtn.type = "button";
          refreshBtn.title = t("refresh");
          refreshBtn.setAttribute("aria-label", t("refresh"));
          refreshBtn.innerHTML = createActionIcon("refresh");
          refreshBtn.onclick = () => requestRefresh();

          const downloadBtn = document.createElement("button");
          downloadBtn.className = "icon-btn";
          downloadBtn.type = "button";
          downloadBtn.title = t("download");
          downloadBtn.setAttribute("aria-label", t("download"));
          downloadBtn.innerHTML = createActionIcon("download");
          downloadBtn.onclick = () => triggerDownload(file.json, file.filename);

          const copyBtn = document.createElement("button");
          copyBtn.className = "icon-btn primary";
          copyBtn.type = "button";
          copyBtn.title = t("copy");
          copyBtn.setAttribute("aria-label", t("copy"));
          copyBtn.innerHTML = createActionIcon("copy");
          copyBtn.onclick = () => copyText(file.json);

          actions.appendChild(refreshBtn);
          actions.appendChild(downloadBtn);
          actions.appendChild(copyBtn);

          header.appendChild(title);
          header.appendChild(actions);

          const container = document.createElement("div");
          container.className = "code-container";

          const shell = document.createElement("div");
          shell.className = "code-shell";

          const lines = document.createElement("pre");
          lines.className = "line-numbers";

          const text = document.createElement("textarea");
          text.className = "code-area";
          text.readOnly = true;
          text.spellcheck = false;
          text.value = file.json;

          updateLineNumbers(lines, text.value);
          syncLineNumbersScroll(text, lines);

          shell.appendChild(lines);
          shell.appendChild(text);

          const footer = document.createElement("div");
          footer.className = "code-footer";
          const tokenPill = document.createElement("div");
          tokenPill.className = "pill";
          const linePill = document.createElement("div");
          linePill.className = "pill";
          const sizePill = document.createElement("div");
          sizePill.className = "pill";
          const stats = getStats(file.json);
          fillPills(tokenPill, linePill, sizePill, stats);
          footer.appendChild(tokenPill);
          footer.appendChild(linePill);
          footer.appendChild(sizePill);

          container.appendChild(shell);
          container.appendChild(footer);

          card.appendChild(header);
          card.appendChild(container);
          splitMain.appendChild(card);
        });
      }

      tabTokens.onclick = () => showPage("tokens");
      tabSettings.onclick = () => showPage("settings");

      document.getElementById("single-refresh").onclick = () =>
        requestRefresh();
      document.getElementById("single-copy").onclick = () =>
        copyText(singleCode.value);
      document.getElementById("single-download").onclick = () => {
        if (!lastPayload || lastPayload.mode !== "single") return;
        triggerDownload(lastPayload.file.json, lastPayload.file.filename);
      };

      includeRootInput.onchange = () => requestRefresh();
      splitFilesInput.onchange = () => {
        updateMainMode();
        requestRefresh();
      };

      languageSelect.onchange = () => {
        currentLanguage = languageSelect.value === "pt" ? "pt" : "en";
        applyTranslations();
        sendSettings();
      };

      singleFilenameInput.onchange = () => sendSettings();
      singleFilenameInput.onblur = () => sendSettings();

      sidebarDownload.onclick = () => {
        if (!lastPayload) return;
        if (lastPayload.mode === "single") {
          triggerDownload(lastPayload.file.json, lastPayload.file.filename);
          return;
        }
        const zip = buildZip(lastPayload.files || []);
        triggerDownload(zip, "tokens.zip", "application/zip");
      };

      onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message || typeof message !== "object") return;

        if (message.type === "tokens-error") {
          return;
        }

        if (message.type === "tokens-generated") {
          lastPayload = message.payload;
          applySettings(lastPayload.settings);
          updateGroupsPanel(
            lastPayload.availableGroups || [],
            lastPayload.selectedGroups || [],
          );

          if (lastPayload.mode === "single") {
            singleCode.value = lastPayload.file.json || "";
            updateLineNumbers(singleLines, singleCode.value);
            const stats = getStats(singleCode.value);
            fillPills(singleTokenPill, singleLinePill, singleSizePill, stats);
            updateMainMode();
            return;
          }

          renderSplit(lastPayload.files || []);
          updateMainMode();
        }
      };

      syncLineNumbersScroll(singleCode, singleLines);
      applyTranslations();
      showPage(currentPage);
      updateMainMode();
      requestRefresh();
    </script>
  </body>
</html>
