<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>DTCG Token Exporter</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        padding: 16px;
        font: 12px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 100%;
        min-height: 100%;
        box-sizing: border-box;
        overflow-y: auto;
        overflow-x: hidden;
      }

      h1 {
        margin: 0;
        font-size: 14px;
        line-height: 1.3;
      }

      .switch-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .switch-row label {
        font-size: 12px;
        color: #333333;
      }

      .hidden {
        display: none !important;
      }

      .editor {
        position: relative;
        flex: 1;
        min-height: 0;
        height: 100%;
        min-height: 360px;
      }

      .editor-actions {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
        z-index: 2;
      }

      .icon-btn {
        width: 32px;
        height: 32px;
        padding: 0;
        border-radius: 6px;
        background: #0d99ff;
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        cursor: pointer;
      }

      .icon-btn svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .code-shell {
        display: flex;
        width: 100%;
        height: 100%;
        border: 1px solid #d2d2d2;
        border-radius: 8px;
        overflow: hidden;
        background: #ffffff;
      }

      .line-numbers {
        margin: 0;
        width: 52px;
        flex: 0 0 52px;
        padding: 48px 8px 12px;
        box-sizing: border-box;
        border-right: 1px solid #e7e7e7;
        background: #f8f8f8;
        color: #888888;
        text-align: right;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.4;
        overflow: hidden;
        user-select: none;
        white-space: pre;
      }

      .code-area {
        width: 100%;
        height: 100%;
        resize: none;
        border: 0;
        padding: 48px 12px 12px;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.4;
        background: transparent;
        color: #101010;
        outline: 0;
      }

      .split-view {
        flex: 0 0 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .split-toolbar {
        display: flex;
        gap: 8px;
      }

      .text-btn {
        border: 0;
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #0d99ff;
        color: #ffffff;
      }

      .split-list {
        flex: 0 0 auto;
        min-height: 0;
        overflow: visible;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-bottom: 12px;
      }

      .split-card {
        position: relative;
        height: 320px;
      }

      .card-title {
        position: absolute;
        left: 12px;
        top: 10px;
        z-index: 2;
        font-size: 12px;
        font-weight: 600;
        color: #333333;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 4px;
        padding: 2px 6px;
      }

      .split-card .code-shell {
        height: 100%;
      }

      .split-card .line-numbers {
        padding-top: 42px;
      }

      .split-card .code-area {
        height: 100%;
        padding-top: 42px;
      }

      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      #status {
        margin: 0;
        font-size: 11px;
        color: #666666;
      }

      #stats {
        margin: 0;
        font-size: 11px;
        color: #666666;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <h1>Exportar Design Tokens (DTCG 2025.10)</h1>

    <div class="switch-row">
      <input id="include-root" type="checkbox" checked />
      <label for="include-root">Incluir coleção/categoria no início do token</label>
    </div>

    <div class="switch-row">
      <input id="split-files" type="checkbox" />
      <label for="split-files">Separar tokens em arquivos por coleção/categoria</label>
    </div>

    <div id="single-view" class="editor">
      <div class="editor-actions">
        <button id="refresh" class="icon-btn" type="button" title="Atualizar" aria-label="Atualizar">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" />
            <polyline points="21 3 21 9 15 9" />
          </svg>
        </button>
        <button id="copy" class="icon-btn" type="button" title="Copiar JSON" aria-label="Copiar JSON">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <button id="download" class="icon-btn" type="button" title="Download tokens.json" aria-label="Download tokens.json">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </button>
      </div>
      <div class="code-shell">
        <pre id="single-lines" class="line-numbers">1</pre>
        <textarea id="json-output" class="code-area" spellcheck="false" readonly></textarea>
      </div>
    </div>

    <div id="split-view" class="split-view hidden">
      <div class="split-toolbar">
        <button id="refresh-all" class="text-btn" type="button">Atualizar tudo</button>
        <button id="download-all" class="text-btn" type="button">Baixar tudo</button>
      </div>
      <div id="split-list" class="split-list"></div>
    </div>

    <div class="footer">
      <p id="status">Gerando tokens...</p>
      <p id="stats">Tokens: 0 | Linhas: 0 | Tamanho: 0 B</p>
    </div>

    <script>
      const output = document.getElementById("json-output");
      const singleLines = document.getElementById("single-lines");
      const status = document.getElementById("status");
      const stats = document.getElementById("stats");
      const includeRootInput = document.getElementById("include-root");
      const splitFilesInput = document.getElementById("split-files");
      const singleView = document.getElementById("single-view");
      const splitView = document.getElementById("split-view");
      const splitList = document.getElementById("split-list");

      let lastPayload = null;

      function setStatus(message) {
        status.textContent = message;
      }

      function setStats(message) {
        stats.textContent = message;
      }

      function lineCount(text) {
        if (!text) return 1;
        return text.split("\n").length;
      }

      function buildLineNumbers(totalLines) {
        const lines = [];
        for (let i = 1; i <= totalLines; i += 1) {
          lines.push(String(i));
        }
        return lines.join("\n");
      }

      function updateLineNumbers(lineNode, text) {
        lineNode.textContent = buildLineNumbers(lineCount(text));
      }

      function syncLineNumbersScroll(textareaNode, lineNode) {
        textareaNode.addEventListener("scroll", () => {
          lineNode.scrollTop = textareaNode.scrollTop;
        });
      }

      function jsonTokenCount(jsonText) {
        try {
          const parsed = JSON.parse(jsonText);
          let total = 0;
          const stack = [parsed];

          while (stack.length > 0) {
            const current = stack.pop();
            if (!current || typeof current !== "object") continue;

            if (!Array.isArray(current)) {
              if (Object.prototype.hasOwnProperty.call(current, "$value")) {
                total += 1;
              }
              Object.keys(current).forEach((key) => {
                stack.push(current[key]);
              });
            } else {
              current.forEach((item) => stack.push(item));
            }
          }

          return total;
        } catch (_error) {
          return 0;
        }
      }

      function bytesOfText(text) {
        return new TextEncoder().encode(text).length;
      }

      function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
      }

      function updateStatsForSingle(jsonText) {
        const tokens = jsonTokenCount(jsonText);
        const lines = lineCount(jsonText);
        const size = formatBytes(bytesOfText(jsonText));
        setStats(`Tokens: ${tokens} | Linhas: ${lines} | Tamanho: ${size}`);
      }

      function updateStatsForSplit(files) {
        let tokens = 0;
        let lines = 0;
        let bytes = 0;

        files.forEach((file) => {
          tokens += jsonTokenCount(file.json);
          lines += lineCount(file.json);
          bytes += bytesOfText(file.json);
        });

        setStats(`Tokens: ${tokens} | Linhas: ${lines} | Tamanho: ${formatBytes(bytes)}`);
      }

      function triggerDownload(json, filename) {
        const blob = new Blob([json], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function triggerBlobDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function makeCrc32Table() {
        const table = new Uint32Array(256);
        for (let i = 0; i < 256; i += 1) {
          let c = i;
          for (let j = 0; j < 8; j += 1) {
            c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
          }
          table[i] = c >>> 0;
        }
        return table;
      }

      const CRC32_TABLE = makeCrc32Table();

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (let i = 0; i < bytes.length; i += 1) {
          crc = CRC32_TABLE[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function dateToDosTimeParts(date) {
        const year = Math.max(1980, date.getFullYear());
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const hours = date.getHours();
        const minutes = date.getMinutes();
        const seconds = Math.floor(date.getSeconds() / 2);

        const dosTime = (hours << 11) | (minutes << 5) | seconds;
        const dosDate = ((year - 1980) << 9) | (month << 5) | day;
        return { dosTime, dosDate };
      }

      function u16le(value) {
        return new Uint8Array([value & 0xff, (value >> 8) & 0xff]);
      }

      function u32le(value) {
        return new Uint8Array([
          value & 0xff,
          (value >> 8) & 0xff,
          (value >> 16) & 0xff,
          (value >> 24) & 0xff,
        ]);
      }

      function concatUint8Arrays(chunks) {
        let total = 0;
        chunks.forEach((chunk) => {
          total += chunk.length;
        });
        const out = new Uint8Array(total);
        let offset = 0;
        chunks.forEach((chunk) => {
          out.set(chunk, offset);
          offset += chunk.length;
        });
        return out;
      }

      function buildZip(files) {
        const encoder = new TextEncoder();
        const now = dateToDosTimeParts(new Date());
        const localParts = [];
        const centralParts = [];
        let offset = 0;

        files.forEach((file) => {
          const nameBytes = encoder.encode(file.filename);
          const dataBytes = encoder.encode(file.json);
          const size = dataBytes.length;
          const checksum = crc32(dataBytes);

          const localHeader = concatUint8Arrays([
            u32le(0x04034b50),
            u16le(20),
            u16le(0),
            u16le(0),
            u16le(now.dosTime),
            u16le(now.dosDate),
            u32le(checksum),
            u32le(size),
            u32le(size),
            u16le(nameBytes.length),
            u16le(0),
            nameBytes,
          ]);

          const localRecord = concatUint8Arrays([localHeader, dataBytes]);
          localParts.push(localRecord);

          const centralHeader = concatUint8Arrays([
            u32le(0x02014b50),
            u16le(20),
            u16le(20),
            u16le(0),
            u16le(0),
            u16le(now.dosTime),
            u16le(now.dosDate),
            u32le(checksum),
            u32le(size),
            u32le(size),
            u16le(nameBytes.length),
            u16le(0),
            u16le(0),
            u16le(0),
            u16le(0),
            u32le(0),
            u32le(offset),
            nameBytes,
          ]);

          centralParts.push(centralHeader);
          offset += localRecord.length;
        });

        const centralDirectory = concatUint8Arrays(centralParts);
        const localSection = concatUint8Arrays(localParts);

        const endOfCentralDirectory = concatUint8Arrays([
          u32le(0x06054b50),
          u16le(0),
          u16le(0),
          u16le(files.length),
          u16le(files.length),
          u32le(centralDirectory.length),
          u32le(localSection.length),
          u16le(0),
        ]);

        const zipBytes = concatUint8Arrays([localSection, centralDirectory, endOfCentralDirectory]);
        return new Blob([zipBytes], { type: "application/zip" });
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch (_error) {
          const tmp = document.createElement("textarea");
          tmp.value = text;
          document.body.appendChild(tmp);
          tmp.select();
          document.execCommand("copy");
          tmp.remove();
        }
      }

      function requestRefresh() {
        setStatus("Atualizando tokens...");
        parent.postMessage(
          {
            pluginMessage: {
              type: "refresh-tokens",
              options: {
                includeCollectionOrCategoryRoot: includeRootInput.checked,
                splitByCollectionOrCategory: splitFilesInput.checked,
              },
            },
          },
          "*"
        );
      }

      function updateViewMode() {
        const split = splitFilesInput.checked;
        singleView.classList.toggle("hidden", split);
        splitView.classList.toggle("hidden", !split);
      }

      function makeIconButton(title, svgPath) {
        const btn = document.createElement("button");
        btn.className = "icon-btn";
        btn.type = "button";
        btn.title = title;
        btn.setAttribute("aria-label", title);
        btn.innerHTML = svgPath;
        return btn;
      }

      function renderSplit(files) {
        splitList.innerHTML = "";

        files.forEach((file) => {
          const card = document.createElement("div");
          card.className = "split-card";

          const title = document.createElement("div");
          title.className = "card-title";
          title.textContent = file.name;

          const actions = document.createElement("div");
          actions.className = "editor-actions";

          const copyBtn = makeIconButton(
            "Copiar",
            '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>'
          );
          copyBtn.onclick = async () => {
            await copyText(file.json);
            setStatus(`JSON copiado: ${file.filename}`);
          };

          const downloadBtn = makeIconButton(
            "Download",
            '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>'
          );
          downloadBtn.onclick = () => {
            triggerDownload(file.json, file.filename);
            setStatus(`Download iniciado: ${file.filename}`);
          };

          actions.appendChild(copyBtn);
          actions.appendChild(downloadBtn);

          const shell = document.createElement("div");
          shell.className = "code-shell";

          const lines = document.createElement("pre");
          lines.className = "line-numbers";

          const textarea = document.createElement("textarea");
          textarea.className = "code-area";
          textarea.readOnly = true;
          textarea.spellcheck = false;
          textarea.value = file.json;
          updateLineNumbers(lines, textarea.value);
          syncLineNumbersScroll(textarea, lines);

          card.appendChild(title);
          card.appendChild(actions);
          shell.appendChild(lines);
          shell.appendChild(textarea);
          card.appendChild(shell);
          splitList.appendChild(card);
        });
      }

      document.getElementById("refresh").onclick = () => {
        requestRefresh();
      };

      document.getElementById("copy").onclick = async () => {
        await copyText(output.value);
        setStatus("JSON copiado.");
      };

      document.getElementById("download").onclick = () => {
        const filename = lastPayload && lastPayload.mode === "single" ? lastPayload.file.filename : "tokens.json";
        triggerDownload(output.value, filename);
        setStatus(`Download iniciado: ${filename}`);
      };

      document.getElementById("refresh-all").onclick = () => {
        requestRefresh();
      };

      document.getElementById("download-all").onclick = () => {
        if (!lastPayload || lastPayload.mode !== "split") return;
        const zipBlob = buildZip(lastPayload.files);
        triggerBlobDownload(zipBlob, "tokens.zip");
        setStatus(`Download iniciado: tokens.zip (${lastPayload.files.length} arquivos).`);
      };

      includeRootInput.onchange = () => {
        requestRefresh();
      };

      splitFilesInput.onchange = () => {
        updateViewMode();
        requestRefresh();
      };

      onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message || typeof message !== "object") return;

        if (message.type === "tokens-generated") {
          lastPayload = message.payload;

          if (lastPayload.mode === "single") {
            output.value = lastPayload.file.json || "";
            updateLineNumbers(singleLines, output.value);
            updateStatsForSingle(output.value);
            updateViewMode();
            setStatus("Tokens gerados com sucesso.");
            return;
          }

          if (lastPayload.mode === "split") {
            renderSplit(lastPayload.files || []);
            updateStatsForSplit(lastPayload.files || []);
            updateViewMode();
            setStatus(`Tokens gerados com sucesso em ${lastPayload.files.length} arquivos.`);
            return;
          }
        }

        if (message.type === "tokens-error") {
          setStatus("Erro ao gerar tokens: " + (message.error || "desconhecido"));
          setStats("Tokens: 0 | Linhas: 0 | Tamanho: 0 B");
          return;
        }
      };

      syncLineNumbersScroll(output, singleLines);
      updateViewMode();
    </script>
  </body>
</html>
